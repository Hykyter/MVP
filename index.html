<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Y-GENESIS: ABSOLUTE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --gold: #ffd700; --bg: #0d0d0f; --card: #1a1a1f; --red: #ff4757; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-user-select: none; }
        
        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #000; border-bottom: 2px solid var(--neon); }
        .balance-box { background: #222; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--neon); font-family: monospace; font-weight: bold; color: var(--neon); }

        /* HERO VIEW */
        #hero-viewport { width: 100%; height: 35vh; background: linear-gradient(to bottom, #000, #1a1a1f); display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid #333; }
        #hero-img { max-height: 90%; max-width: 90%; border-radius: 15px; display: none; box-shadow: 0 0 30px rgba(0,255,204,0.2); border: 1px solid rgba(0,255,204,0.3); }
        .loading-anim { color: var(--neon); font-family: monospace; font-size: 14px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* TABS */
        .tabs { display: flex; justify-content: space-around; background: #000; padding: 10px 0; position: sticky; top: 0; z-index: 100; }
        .tab-btn { background: none; border: none; color: #555; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn.active { color: var(--neon); text-shadow: 0 0 8px var(--neon); }

        /* CONTENT */
        .content { padding: 15px; height: 50vh; overflow-y: auto; padding-bottom: 80px; }
        .panel { display: none; animation: fadeIn 0.3s; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI ELEMENTS */
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .btn { background: var(--neon); color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-outline { background: none; border: 1px solid var(--neon); color: var(--neon); }
        
        select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 10px; }

        /* MINES GAME */
        .mines-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .cell { background: #222; height: 60px; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .cell.safe { background: rgba(0, 255, 204, 0.2); border-color: var(--neon); }
        .cell.bomb { background: rgba(255, 71, 87, 0.2); border-color: var(--red); }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; color:var(--neon)">Y-GENESIS</div>
    <div class="balance-box">🔋 <span id="balance">1000</span> Y-CELLS</div>
    <div id="ton-connect"></div>
</header>

<div id="hero-viewport">
    <div id="status-txt" class="loading-anim">ОЖИДАНИЕ СИГНАЛА...</div>
    <img id="hero-img" src="" alt="Hero">
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('lab', this)">Лаба</button>
    <button class="tab-btn" onclick="showTab('games', this)">Мины</button>
    <button class="tab-btn" onclick="showTab('case', this)">Кейсы</button>
    <button class="tab-btn" onclick="showTab('upgrade', this)">Апгрейд</button>
</div>

<div class="content">
    <div id="lab" class="panel active">
        <div class="card">
            <h4 style="margin-top:0">🧬 СОЗДАТЬ БОЙЦА</h4>
            <select id="hero-type">
                <option value="SAMURAI">КИБЕР-САМУРАЙ</option>
                <option value="NINJA">ТЕХНО-НИНДЗЯ</option>
                <option value="TANK">ТЯЖЕЛЫЙ ДРОН</option>
            </select>
            <button class="btn" onclick="createHero()">ГЕНЕРАЦИЯ (200 Y)</button>
        </div>
        <div id="hero-stats" class="card" style="display:none; border-left: 4px solid var(--neon);">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span id="h-class" style="font-weight:bold; color:var(--neon)"></span>
                <span id="h-rarity" style="font-size:12px; font-weight:bold"></span>
            </div>
            <div style="font-size:14px; opacity:0.8">
                ⚡ МОЩЬ: <span id="h-power">0</span> | 🤸 ЛОВКОСТЬ: <span id="h-agil">0</span>
            </div>
            <button class="btn btn-outline" style="margin-top:10px; font-size:12px;" onclick="mintNFT()">MINT NFT (2.5 TON)</button>
        </div>
    </div>

    <div id="games" class="panel">
        <div class="card">
            <h4 style="margin:0">💣 КРИПТО-МИНЫ</h4>
            <p style="font-size:12px; color:#777">Найди сокровища, не взорвись!</p>
            <div class="mines-grid" id="mines-board">
                </div>
            <button class="btn" id="start-mines" onclick="startMines()">СТАВКА 100 Y</button>
        </div>
    </div>

    <div id="case" class="panel">
        <div class="card" style="text-align:center; border: 1px solid var(--gold)">
            <h3 style="color:var(--gold); margin:0">ЧАД-БОКС</h3>
            <p style="font-size:12px">Шанс на АБСОЛЮТА 5%</p>
            <div style="font-size:50px; margin:20px 0">📦</div>
            <button class="btn" style="background:var(--gold)" onclick="openCase()">ОТКРЫТЬ (500 Y)</button>
        </div>
    </div>

    <div id="upgrade" class="panel">
        <div class="card">
            <h4>📈 УЛУЧШИТЬ ПЕРСОНАЖА</h4>
            <p style="font-size:12px">Повышает все статы на +10%</p>
            <button class="btn" onclick="upgradeHero()">УЛУЧШИТЬ (300 Y)</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        balance: 1000,
        hasHero: false,
        power: 0,
        agil: 0,
        rarity: 'ОБЫЧНЫЙ'
    };

    // TON Connect
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://hykyter.github.io/MVP/tonconnect-manifest.json',
        buttonRootId: 'ton-connect'
    });

    function showTab(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    function updateUI() {
        document.getElementById('balance').innerText = state.balance;
    }

    // ЛОГИКА ГЕНЕРАЦИИ
    const heroImgs = [
        "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=400",
        "https://images.unsplash.com/photo-1614728263952-84ea256f9679?w=400",
        "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=400"
    ];

    function createHero() {
        if(state.balance < 200) return tg.showAlert("Недостаточно Y-клеток!");
        
        state.balance -= 200;
        updateUI();
        
        document.getElementById('status-txt').innerText = "ГЕНЕРАЦИЯ ДНК...";
        document.getElementById('hero-img').style.display = 'none';

        setTimeout(() => {
            state.hasHero = true;
            state.power = Math.floor(Math.random() * 50) + 50;
            state.agil = Math.floor(Math.random() * 50) + 50;
            
            const luck = Math.random();
            state.rarity = luck > 0.9 ? 'АБСОЛЮТ' : (luck > 0.7 ? 'ЭПИК' : 'ОБЫЧНЫЙ');

            document.getElementById('status-txt').style.display = 'none';
            const img = document.getElementById('hero-img');
            img.src = heroImgs[Math.floor(Math.random()*heroImgs.length)];
            img.style.display = 'block';

            document.getElementById('hero-stats').style.display = 'block';
            document.getElementById('h-class').innerText = document.getElementById('hero-type').value;
            document.getElementById('h-rarity').innerText = state.rarity;
            document.getElementById('h-power').innerText = state.power;
            document.getElementById('h-agil').innerText = state.agil;
            
            tg.HapticFeedback.notificationOccurred('success');
        }, 1500);
    }

    // МИНЫ
    let mineBoard = [];
    function startMines() {
        if(state.balance < 100) return tg.showAlert("Нужно 100 Y!");
        state.balance -= 100;
        updateUI();

        const grid = document.getElementById('mines-board');
        grid.innerHTML = '';
        mineBoard = Array(16).fill(0).map(() => Math.random() > 0.3 ? '💎' : '💣');

        for(let i=0; i<16; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = '?';
            cell.onclick = () => {
                if(cell.innerText !== '?') return;
                const res = mineBoard[i];
                cell.innerText = res;
                if(res === '💣') {
                    cell.classList.add('bomb');
                    tg.HapticFeedback.notificationOccurred('error');
                    tg.showAlert("БУМ! Ты проиграл.");
                    setTimeout(startMines, 1000);
                } else {
                    cell.classList.add('safe');
                    state.balance += 30;
                    updateUI();
                    tg.HapticFeedback.impactOccurred('light');
                }
            };
            grid.appendChild(cell);
        }
    }

    function openCase() {
        if(state.balance < 500) return tg.showAlert("Копи Y-клетки!");
        state.balance -= 500;
        updateUI();
        createHero(); // Кейс просто триггерит элитную генерацию
        tg.showAlert("Кейс открыт! Смотри в Лабе.");
    }

    function upgradeHero() {
        if(!state.hasHero) return tg.showAlert("Сначала создай бойца!");
        if(state.balance < 300) return tg.showAlert("Мало валюты!");
        
        state.balance -= 300;
        state.power += 15;
        state.agil += 15;
        updateUI();
        
        document.getElementById('h-power').innerText = state.power;
        document.getElementById('h-agil').innerText = state.agil;
        tg.showAlert("УРОВЕНЬ ПОВЫШЕН!");
    }

    function mintNFT() {
        if(!tonConnectUI.connected) return tg.showAlert("Подключи TON!");
        tg.showAlert("Минт запущен... Проверь кошелек.");
    }

    updateUI();
</script>
</body>
</html>
